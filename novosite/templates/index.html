<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste</title>
</head>

<body>  
    <div class="row">
        <div class="col-8 mauto pt-2 pb-2 text-center">
            <h1>CRUD</h1>
        </div>
        <div class="col-4 mauto pt-3 pb-2 text-center">
            <a href="/form" class="btn btn-success">ADICIONAR</a>
        </div>
    </div>
    <table class="table">
        <thead class="thead-dark">
            <tr>
                <th scope="col" c>#</th>
                <th scope="col">Marca</th>
                <th scope="col">Modelo</th>
                <th scope="col">Ano</th>
                <th scope="col">Ações</th>
            </tr>
        </thead>
            {% for carro in carros %}
            <tr>
                <th scope="row"  >{{ carro.id }}</th>
                <td>{{ carro.marca }}</td>
                <td>{{ carro.modelo }}</td>
                <td>{{ carro.ano }}</td>
                <td>
                    <a href="/visualizar/{{ carro.id }}/" class="btn btn-dark">Detalhes</a>
                    <a href="/editar/{{ carro.id }}/" class="btn btn-warning">Editar</a>
                    <a href="/deletar/{{ carro.id }}/" class="btn btn-danger">Deletar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>

</html>
